</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="4" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E4%BB%80%E4%B9%88%E6%98%AF-marp">什么是 Marp？</h1>
<p>Marp 是一个基于 Markdown 的幻灯片制作生态，适合用纯文本方式快速编写、维护和导出演示文稿。</p>
<div class="columns-6-4">
<div>
<h2 id="%E6%A0%B8%E5%BF%83%E7%89%B9%E7%82%B9">核心特点</h2>
<ul>
<li>使用 Markdown 编写幻灯片</li>
<li>支持主题 CSS 自定义</li>
<li>支持 PDF、PPTX、HTML 等格式导出</li>
<li>支持数学公式、代码块、图片和表格</li>
<li>适合版本管理与团队协作</li>
</ul>
</div>
<div>
<div class="box info" data-label="适合谁使用？">
科研人员、教师、学生、开发者、技术写作者，以及需要长期维护演示文稿的人。
</div>
<div class="box success" data-label="核心优势">
把 PPT 内容变成可读、可复用、可追踪的 Markdown 文档。
</div>
</div>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="5" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-%E9%80%82%E7%94%A8%E5%9C%BA%E6%99%AF">Marp 适用场景</h1>
<p>Marp 特别适合结构化、可复用、重视内容维护的演示场景。</p>
<table>
<thead>
<tr>
<th>场景</th>
<th>说明</th>
</tr>
</thead>
<tbody>
<tr>
<td>科研汇报</td>
<td>论文解读、组会报告、开题答辩、学术会议</td>
</tr>
<tr>
<td>课程教学</td>
<td>课件、讲义、习题讲解、知识点总结</td>
</tr>
<tr>
<td>技术分享</td>
<td>架构说明、代码演示、项目复盘</td>
</tr>
<tr>
<td>文档型演示</td>
<td>产品介绍、培训材料、方案汇报</td>
</tr>
<tr>
<td>团队协作</td>
<td>使用 Git 管理版本、多人协同修改</td>
</tr>
</tbody>
</table>
<div class="box info" data-label="Tip">
如果你的演示内容需要频繁修改、多人协作或保留版本历史，Marp 会比传统 PPT 更容易维护。
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="6" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-%E7%9A%84%E5%9F%BA%E6%9C%AC%E5%B7%A5%E4%BD%9C%E6%96%B9%E5%BC%8F">Marp 的基本工作方式</h1>
<p>Marp 的基本思想是：<strong>用 Markdown 写内容，用 CSS 控制样式，用工具导出演示文件。</strong></p>
<div class="columns-3">
<div>
<h3 id="1-%E7%BC%96%E5%86%99">1. 编写</h3>
<p>使用 Markdown 编写内容：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># 标题</span>

<span class="hljs-bullet">-</span> 要点一
<span class="hljs-bullet">-</span> 要点二
</code></pre>
</div>
<div>
<h3 id="2-%E5%A5%97%E7%94%A8%E4%B8%BB%E9%A2%98">2. 套用主题</h3>
<p>通过 Front Matter 指定主题：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-meta">---
</span></code></pre>
</div>
<div>
<h3 id="3-%E5%AF%BC%E5%87%BA">3. 导出</h3>
<p>生成多种格式：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">PDF
PPTX
HTML
PNG
JPEG
</code></pre>
</div>
</div>
<div class="formula-box">
<p>Markdown + CSS Theme + Marp Engine = Slide Deck</p>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="7" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-%E6%96%87%E4%BB%B6%E5%9F%BA%E6%9C%AC%E7%BB%93%E6%9E%84">Marp 文件基本结构</h1>
<p>一个 Marp 幻灯片文件通常由 <strong>Front Matter</strong> 和 <strong>多页 Markdown 内容</strong> 组成。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">---
marp: true
theme: neobeam-lgy
paginate: true
math: katex
<span class="hljs-section">size: 16:9
---</span>

<span class="hljs-section"># 第一页标题</span>

第一页内容

---

<span class="hljs-section"># 第二页标题</span>

第二页内容
</code></pre>
<h2 id="%E5%85%B3%E9%94%AE%E8%AF%B4%E6%98%8E">关键说明</h2>
<ul>
<li><code>---</code> 在顶部表示配置区</li>
<li><code>---</code> 在正文中表示分页</li>
<li><code>theme</code> 指定当前使用的主题</li>
<li><code>paginate</code> 控制是否显示页码</li>
<li><code>math</code> 控制数学公式渲染</li>
<li><code>size</code> 控制页面比例</li>
</ul>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="8" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-%E5%B8%B8%E7%94%A8-front-matter-%E9%85%8D%E7%BD%AE">Marp 常用 Front Matter 配置</h1>
<table>
<thead>
<tr>
<th>配置项</th>
<th>示例</th>
<th>作用</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>marp</code></td>
<td><code>true</code></td>
<td>启用 Marp 幻灯片</td>
</tr>
<tr>
<td><code>theme</code></td>
<td><code>neobeam-lgy</code></td>
<td>指定 CSS 主题</td>
</tr>
<tr>
<td><code>paginate</code></td>
<td><code>true</code></td>
<td>显示页码</td>
</tr>
<tr>
<td><code>math</code></td>
<td><code>katex</code></td>
<td>启用数学公式</td>
</tr>
<tr>
<td><code>size</code></td>
<td><code>16:9</code></td>
<td>设置幻灯片比例</td>
</tr>
<tr>
<td><code>header</code></td>
<td><code>课程名</code></td>
<td>设置页眉</td>
</tr>
<tr>
<td><code>footer</code></td>
<td><code>作者 / 日期</code></td>
<td>设置页脚</td>
</tr>
</tbody>
</table>
<p>推荐配置：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-attr">paginate:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">math:</span> <span class="hljs-string">katex</span>
<span class="hljs-attr">size:</span> <span class="hljs-number">16</span><span class="hljs-string">:9</span>
<span class="hljs-attr">footer:</span> <span class="hljs-string">&#x27;&lt;span&gt;作者 / 单位&lt;/span&gt;&lt;span&gt;报告标题&lt;/span&gt;&lt;span&gt;日期&lt;/span&gt;&#x27;</span>
<span class="hljs-meta">---
</span></code></pre>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="9" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%9C%A8-vs-code-%E4%B8%AD%E4%BD%BF%E7%94%A8-marp">在 VS Code 中使用 Marp</h1>
<p>推荐使用官方插件 <strong>Marp for VS Code</strong>，可以实现实时预览和一键导出。</p>
<div class="columns-6-4">
<div>
<h2 id="%E5%AE%89%E8%A3%85%E6%AD%A5%E9%AA%A4">安装步骤</h2>
<ol>
<li>打开 VS Code</li>
<li>进入 Extensions 扩展面板</li>
<li>搜索 <code>Marp for VS Code</code></li>
<li>安装由 <strong>Marp Team</strong> 发布的插件</li>
<li>打开 <code>.md</code> 幻灯片文件</li>
</ol>
<h2 id="%E9%A2%84%E8%A7%88%E6%96%B9%E5%BC%8F">预览方式</h2>
<p>点击右上角：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Open Preview to the Side
</code></pre>
<p>即可实时预览幻灯片效果。</p>
</div>
<div>
<h2 id="markdown-%E5%A4%B4%E9%83%A8%E9%85%8D%E7%BD%AE">Markdown 头部配置</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-attr">paginate:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">math:</span> <span class="hljs-string">katex</span>
<span class="hljs-attr">size:</span> <span class="hljs-number">16</span><span class="hljs-string">:9</span>
<span class="hljs-meta">---
</span></code></pre>
<div class="box info" data-label="Tip">
只有当文件头部包含 <code>marp: true</code> 时，Marp for VS Code 才会按幻灯片方式解析。
</div>
</div>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="10" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%9C%A8-vs-code-%E4%B8%AD%E9%85%8D%E7%BD%AE%E8%87%AA%E5%AE%9A%E4%B9%89%E4%B8%BB%E9%A2%98">在 VS Code 中配置自定义主题</h1>
<p>使用本主题时，需要让 VS Code 知道 <code>neobeam-lgy.css</code> 的位置。</p>
<div class="columns-5-5">
<div>
<h2 id="%E6%96%B9%E6%B3%95%E4%B8%80settings-ui">方法一：Settings UI</h2>
<ol>
<li>打开 VS Code 设置</li>
<li>搜索 <code>Marp Themes</code></li>
<li>找到 <code>Markdown › Marp: Themes</code></li>
<li>添加主题 CSS 路径：</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">./neobeam-lgy.css
</code></pre>
</div>
<div>
<h2 id="%E6%96%B9%E6%B3%95%E4%BA%8Csettingsjson">方法二：settings.json</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;markdown.marp.themes&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span>
    <span class="hljs-string">&quot;./neobeam-lgy.css&quot;</span>
  <span class="hljs-punctuation">]</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<h2 id="%E6%8E%A8%E8%8D%90%E7%9B%AE%E5%BD%95%E7%BB%93%E6%9E%84">推荐目录结构</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">project/
├── slides.md
├── neobeam-lgy.css
└── images/
    ├── logo.png
    └── figure.png
</code></pre>
</div>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-class="dense" data-theme="neobeam-lgy" lang="zh-CN" class="dense" data-marpit-pagination="11" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--class:dense;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E4%BD%BF%E7%94%A8-vs-code-%E5%AF%BC%E5%87%BA%E5%B9%BB%E7%81%AF%E7%89%87">使用 VS Code 导出幻灯片</h1>
<p>Marp for VS Code 可以直接导出为 <code>PDF</code>、<code>PPTX</code>、<code>HTML</code>、图片等格式。</p>
<div class="columns-6-4">
<div>
<h2 id="%E5%AF%BC%E5%87%BA%E6%AD%A5%E9%AA%A4">导出步骤</h2>
<ol>
<li>打开 <code>.md</code> 幻灯片文件</li>
<li>确认顶部包含：</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-meta">---
</span></code></pre>
<ol start="3">
<li>
<p>打开命令面板：</p>
<ul>
<li>Windows / Linux：<code>Ctrl + Shift + P</code></li>
<li>macOS：<code>Cmd + Shift + P</code></li>
</ul>
</li>
<li>
<p>输入并选择：</p>
</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Marp: Export Slide Deck
</code></pre>
<ol start="5">
<li>选择导出格式与保存位置</li>
</ol>
</div>
<div>
<h2 id="%E5%B8%B8%E7%94%A8%E6%A0%BC%E5%BC%8F">常用格式</h2>
<table>
<thead>
<tr>
<th>格式</th>
<th>用途</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>PDF</code></td>
<td>提交、打印、归档</td>
</tr>
<tr>
<td><code>PPTX</code></td>
<td>PowerPoint 二次编辑</td>
</tr>
<tr>
<td><code>HTML</code></td>
<td>网页展示</td>
</tr>
<tr>
<td><code>PNG/JPEG</code></td>
<td>单页图片或预览图</td>
</tr>
</tbody>
</table>
<div class="box warn" data-label="注意">
如果导出时主题没有生效，通常是 CSS 路径没有配置正确，或 Front Matter 中的 theme 名称不匹配。
</div>
</div>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="12" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E4%BD%BF%E7%94%A8-marp-cli">使用 Marp CLI</h1>
<p>Marp CLI 适合批量导出、自动化构建和命令行工作流。</p>
<div class="columns-6-4">
<div>
<h2 id="%E5%AE%89%E8%A3%85">安装</h2>
<p>需要先安装 Node.js，然后执行：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">npm install -g @marp-team/marp-cli
</code></pre>
<h2 id="%E5%B8%B8%E7%94%A8%E5%91%BD%E4%BB%A4">常用命令</h2>
<p>导出 PDF：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --pdf
</code></pre>
<p>导出 PPTX：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --pptx
</code></pre>
<p>导出 HTML：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --html
</code></pre>
</div>
<div>
<h2 id="%E9%80%82%E7%94%A8%E5%9C%BA%E6%99%AF">适用场景</h2>
<ul>
<li>批量生成课件</li>
<li>在 CI/CD 中自动导出</li>
<li>用脚本统一构建多个版本</li>
<li>在服务器环境中生成 HTML 或 PDF</li>
<li>与 Git、Makefile、npm scripts 配合使用</li>
</ul>
<div class="box success" data-label="推荐">
如果只是日常编辑，优先使用 VS Code；如果需要自动化和批量导出，推荐使用 Marp CLI。
</div>
</div>
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="13" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-cli-%E5%AF%BC%E5%87%BA%E7%A4%BA%E4%BE%8B">Marp CLI 导出示例</h1>
<p>假设项目结构如下：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">project/
├── slides.md
├── neobeam-lgy.css
└── images/
    └── architecture.png
</code></pre>
<h2 id="%E5%AF%BC%E5%87%BA%E4%B8%BA%E4%B8%8D%E5%90%8C%E6%A0%BC%E5%BC%8F">导出为不同格式</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 导出 PDF</span>
marp slides.md --theme neobeam-lgy.css --pdf

<span class="hljs-comment"># 导出 PPTX</span>
marp slides.md --theme neobeam-lgy.css --pptx

<span class="hljs-comment"># 导出 HTML</span>
marp slides.md --theme neobeam-lgy.css --html

<span class="hljs-comment"># 导出图片</span>
marp slides.md --theme neobeam-lgy.css --images png
</code></pre>
<div class="box info" data-label="Tip">
建议把常用导出命令写入 <code>package.json</code>，方便团队统一使用。
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="14" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="packagejson-%E8%87%AA%E5%8A%A8%E5%8C%96%E5%AF%BC%E5%87%BA">package.json 自动化导出</h1>
<p>可以在项目中创建 <code>package.json</code>，统一管理导出命令。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;scripts&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;pdf&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;marp slides.md --theme neobeam-lgy.css --pdf&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;pptx&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;marp slides.md --theme neobeam-lgy.css --pptx&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;html&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;marp slides.md --theme neobeam-lgy.css --html&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;all&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;npm run pdf &amp;&amp; npm run pptx &amp;&amp; npm run html&quot;</span>
  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;devDependencies&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;@marp-team/marp-cli&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;latest&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<h2 id="%E4%BD%BF%E7%94%A8%E6%96%B9%E5%BC%8F">使用方式</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">npm install
npm run pdf
npm run pptx
npm run html
npm run all
</code></pre>
<p>这样可以保证团队成员使用一致的导出命令。</p>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="15" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="vs-code-%E4%B8%8E-cli-%E5%AF%B9%E6%AF%94">VS Code 与 CLI 对比</h1>
<table>
<thead>
<tr>
<th>使用方式</th>
<th>优点</th>
<th>适合场景</th>
</tr>
</thead>
<tbody>
<tr>
<td>Marp for VS Code</td>
<td>实时预览、操作简单、一键导出</td>
<td>日常写作、课程备课、个人汇报</td>
</tr>
<tr>
<td>Marp CLI</td>
<td>可脚本化、可批量处理、适合自动化</td>
<td>团队项目、批量课件、CI/CD 构建</td>
</tr>
</tbody>
</table>
<div class="box info" data-label="建议">
初学者可以先使用 VS Code 插件；熟悉之后，再使用 CLI 管理复杂项目和自动化导出流程。
</div>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-class="section" data-theme="neobeam-lgy" lang="zh-CN" class="section" data-marpit-pagination="16" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--class:section;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="neobeam-lgy%E4%B8%BB%E9%A2%98%E4%BB%8B%E7%BB%8D">neobeam-lgy主题介绍</h1>
<h2 id="%E5%9F%BA%E4%BA%8Eneobeam%E6%A8%A1%E7%89%88marp-neobeam">基于neobeam模版<a href="https://github.com/mikael-ros/neobeam">Marp Neobeam</a></h2>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="17" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%BF%AB%E9%80%9F%E5%BC%80%E5%A7%8B">快速开始</h1>
<h2 id="%E5%9F%BA%E6%9C%AC-front-matter">基本 Front Matter</h2>
<p>在 Markdown 文件顶部写入：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-attr">paginate:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">math:</span> <span class="hljs-string">katex</span>
<span class="hljs-attr">size:</span> <span class="hljs-number">16</span><span class="hljs-string">:9</span>
<span class="hljs-meta">---
</span></code></pre>
<ul>
<li><code>marp: true</code>：启用 Marp</li>
<li><code>theme: neobeam-lgy</code>：应用本主题</li>
<li><code>paginate: true</code>：启用页码</li>
<li><code>math: katex</code>：启用 KaTeX 数学公式</li>
<li><code>size: 16:9</code>：使用 16:9 页面比例</li>
</ul>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="18" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E9%A1%B5%E9%9D%A2%E6%AF%94%E4%BE%8B">页面比例</h1>
<p>主题内置支持两种常见比例：</p>
<table>
<thead>
<tr>
<th>比例</th>
<th style="text-align:right">尺寸</th>
<th>推荐场景</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>16:9</code></td>
<td style="text-align:right"><code>1280px × 720px</code></td>
<td>学术报告、会议演示、线上答辩</td>
</tr>
<tr>
<td><code>4:3</code></td>
<td style="text-align:right"><code>960px × 720px</code></td>
<td>传统投影、课堂教学</td>
</tr>
</tbody>
</table>
<p>示例：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">neobeam-lgy</span>
<span class="hljs-attr">size:</span> <span class="hljs-number">4</span><span class="hljs-string">:3</span>
<span class="hljs-meta">---
</span></code></pre>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="19" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E6%99%AE%E9%80%9A%E9%A1%B5%E9%9D%A2%E6%A0%87%E9%A2%98">普通页面标题</h1>
<p>普通页面中的一级标题 <code>#</code> 会自动显示为顶部深蓝标题栏。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># 普通页面标题</span>

正文内容写在这里。
</code></pre>
<p>适合：</p>
<ul>
<li>常规内容页</li>
<li>方法说明页</li>
<li>实验结果页</li>
<li>课程讲解页</li>
</ul>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">softmax</span>(<span class="hljs-params">x</span>):
    x = x - np.<span class="hljs-built_in">max</span>(x)
    exp_x = np.exp(x)
    <span class="hljs-keyword">return</span> exp_x / np.<span class="hljs-built_in">sum</span>(exp_x)

logits = np.array([<span class="hljs-number">1.2</span>, <span class="hljs-number">0.7</span>, <span class="hljs-number">2.4</span>])
<span class="hljs-built_in">print</span> softmax(logits)
</code></pre>

=

=

\sum_{i=1}^{N}
y_i \log f_\theta(x_i)
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathcal">L</span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.02778em;">θ</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:3.106em;vertical-align:-1.2777em;"></span><span class="mord">−</span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3214em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.10903em;">N</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mop op-limits"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.8283em;"><span style="top:-1.8723em;margin-left:0em;"><span class="pstrut" style="height:3.05em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">i</span><span class="mrel mtight">=</span><span class="mord mtight">1</span></span></span></span><span style="top:-3.05em;"><span class="pstrut" style="height:3 rd"><span class="mord mathnormal">x</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">)</span></span></span></span></span></p><footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="57" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">

<h2 id="1-1">(1)</h2>
<h1 id="%E9%87%8D%E7%82%B9%E5%85%AC%E5%BC%8F%E6%A1%86">重点公式框</h1>
<p>使用 <code>.formula-box</code> 突出核心公式：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;formula-box&quot;</span>&gt;</span>

$$

<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
</code></pre>
<p>效果：</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="111" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="vs-code-%E4%B8%AD%E4%BD%BF%E7%94%A8">VS Code 中使用</h1>
<p>推荐安装：</p>
<ul>
<li>Marp for VS Code</li>
<li>Markdown Preview Enhanced，可选</li>
</ul>
<p>使用步骤：</p>
<ol>
<li>将 <code>neobeam-lgy.css</code> 放入项目目录</li>
<li>在 VS Code 设置中加入主题路径</li>
<li>在 Markdown 顶部设置 <code>theme: neobeam-lgy</code></li>
<li>使用 Marp 预览或导出 PDF / PPTX</li>
</ol>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="112" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="112" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="marp-cli-%E4%BD%BF%E7%94%A8">Marp CLI 使用</h1>
<p>安装：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">npm install -g @marp-team/marp-cli
</code></pre>
<p>导出 PDF：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --pdf
</code></pre>
<p>导出 PPTX：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --pptx
</code></pre>
<p>导出 HTML：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">marp slides.md --theme neobeam-lgy.css --html
</code></pre>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="113" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="113" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E4%BD%BF%E7%94%A8%E5%BB%BA%E8%AE%AE">使用建议</h1>
<ul>
<li>每页只表达一个核心观点</li>
<li>尽量避免单页文字过多</li>
<li>复杂页面优先使用 <code>columns</code></li>
<li>数据页可使用 <code>wide</code></li>
<li>章节之间使用 <code>section theme-*</code></li>
<li>结论或关键观点可使用 <code>dark</code></li>
<li>数学推导页面可使用 <code>formula-box</code>、<code>.proof</code>、<code>.box theorem</code></li>
</ul>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="114" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="114" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%B8%B8%E8%A7%81%E9%97%AE%E9%A2%98">常见问题</h1>
<h2 id="%E5%9B%BE%E7%89%87%E4%B8%8D%E5%B1%85%E4%B8%AD">图片不居中？</h2>
<p>使用：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">![<span class="hljs-string">#center</span>](<span class="hljs-link">./image.png</span>)
</code></pre>
<p>或者：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;figure&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">img</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./image.png&quot;</span> /&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;caption&quot;</span>&gt;</span>图注<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
</code></pre>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="115" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="115" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%B8%B8%E8%A7%81%E9%97%AE%E9%A2%98-1">常见问题</h1>
<h2 id="%E8%A1%A8%E6%A0%BC%E5%9C%A8%E5%8F%8C%E6%A0%8F%E9%87%8C%E5%AE%BD%E5%BA%A6%E5%BC%82%E5%B8%B8">表格在双栏里宽度异常？</h2>
<p>本主题已经内置修复规则。建议仍然使用：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;columns&quot;</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>

| A | B |
|---|---|
| 1 | 2 |

<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>

右侧内容

<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>

<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
</code></pre>
<p>确保表格被放在对应列的 <code>&lt;div&gt;</code> 内。</p>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="116" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="116" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%B8%B8%E8%A7%81%E9%97%AE%E9%A2%98-2">常见问题</h1>
<h2 id="%E5%86%85%E5%AE%B9%E5%A4%AA%E5%A4%9A%E6%94%BE%E4%B8%8D%E4%B8%8B">内容太多放不下？</h2>
<p>可以尝试：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">&lt;!-- <span class="hljs-emphasis">_class: dense --&gt;
&lt;!-- _</span>class: denser --&gt;
&lt;!-- <span class="hljs-emphasis">_class: densest --&gt;
&lt;!-- _</span>class: wide --&gt;
</code></pre>
<p>建议优先拆页，其次再使用紧凑类。</p>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="117" data-paginate="true" data-footer="&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;" data-theme="neobeam-lgy" lang="zh-CN" data-marpit-pagination="117" style="--paginate:true;--footer:&lt;span&gt;Neobeam Academic Theme&lt;/span&gt;&lt;span&gt;Marp 使用指南&lt;/span&gt;&lt;span&gt;2026&lt;/span&gt;;--theme:neobeam-lgy;" data-marpit-pagination-total="118" data-size="16:9">
<h1 id="%E5%B8%B8%E8%A7%81%E9%97%AE%E9%A2%98-3">常见问题</h1>
<h2 id="%E4%B8%AD%E6%96%87%E5%AD%97%E4%BD%93%E6%98%BE%E7%A4%BA%E4%B8%8D%E4%B8%80%E8%87%B4">中文字体显示不一致？</h2>
<p>主题默认字体栈为：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-css">&quot;Inter&quot;, &quot;PingFang SC&quot;, &quot;Hiragino Sans GB&quot;,
&quot;Microsoft YaHei&quot;, &quot;Apple <span class="hljs-attribute">Color</span> Emoji&quot;,
&quot;Segoe UI Emoji&quot;, sans-serif
</code></pre>
<p>如果导出环境缺少对应字体，可能会使用系统默认字体。建议在导出机器上安装常用中文字体。</p>
<footer><span>Neobeam Academic Theme</span><span>Marp 使用指南</span><span>2026</span></footer>
</section>
